appId: com.moreih29.nexus-code
productName: "NexusCode"

directories:
  buildResources: build
  output: dist

artifactName: "${productName}-${version}-${arch}.${ext}"

extraResources:
  - from: dist/agent
    to: agent

asar: true
asarUnpack:
  - "**/*.node"
  - "node_modules/node-pty/**"
  - "node_modules/better-sqlite3/**"

mac:
  # Apple Silicon (arm64) 만 정식 배포. Intel x64 가 필요하면 CLI 에서 `--x64` 명시.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  identity: null
  notarize: false

publish:
  provider: github
  owner: moreih29
  repo: nexus-code
