appId: com.moreih29.nexus-code
productName: "NexusCode"

directories:
  buildResources: build
  output: dist

artifactName: "${productName}-${version}-${arch}.${ext}"

# extraResources 복사 시 떨어진 에이전트 바이너리 실행 비트(+x)를 패킹 직후 복원.
afterPack: build/after-pack.cjs

extraResources:
  - from: dist/agent
    to: agent

# 패킹 대상 화이트리스트. 미지정 시 electron-builder 가 작업 디렉터리 전체를
# 순회(bun 환경에서는 의존성 트리 프루닝이 제한적)하여 src/tests/docs/.nexus/
# references 등 런타임에 불필요한 소스·문서까지 asar 에 포함된다. 런타임은
# 빌드 산출물(out/)과 package.json, 그리고 prod node_modules 만 필요하다.
# (node_modules 의 prod 의존성은 files 와 무관하게 electron-builder 가 자동 포함한다.)
files:
  - out/**
  - package.json

asar: true
asarUnpack:
  - "**/*.node"
  - "node_modules/node-pty/**"
  - "node_modules/better-sqlite3/**"

mac:
  # Apple Silicon (arm64) 만 정식 배포. Intel x64 가 필요하면 CLI 에서 `--x64` 명시.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  identity: null
  notarize: false

publish:
  provider: github
  owner: moreih29
  repo: nexus-code
