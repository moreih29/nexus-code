name: Contracts Drift

on:
  push:
    branches:
      - main
    paths:
      - "schema/**"
      - "packages/shared/src/contracts/**"
      - "sidecar/internal/contracts/**"
      - ".github/workflows/contracts-drift.yml"
      - "package.json"
      - "scripts/gen-contracts.ts"
      - "scripts/check-go-contracts-drift.sh"
      - "scripts/check-dist-require.sh"
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
    paths:
      - "schema/**"
      - "packages/shared/src/contracts/**"
      - "sidecar/internal/contracts/**"
      - ".github/workflows/contracts-drift.yml"
      - "package.json"
      - "scripts/gen-contracts.ts"
      - "scripts/check-go-contracts-drift.sh"
      - "scripts/check-dist-require.sh"

jobs:
  contracts-drift:
    name: Contracts drift gate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache Bun lockfile install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: sidecar/go.mod
          cache: true
          cache-dependency-path: sidecar/go.sum

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate TypeScript contracts
        run: bun run gen:contracts

      - name: Check TypeScript generated contract drift
        run: |
          git diff --exit-code packages/shared/src/contracts/generated || {
            echo "Run \`bun run gen:contracts\` locally and commit the result."
            exit 1
          }

      - name: Check Go manual contract drift
        run: |
          scripts/check-go-contracts-drift.sh || {
            echo "Schema와 수작업 Go contracts 동기화 필요. 변경된 schema를 sidecar/internal/contracts/에 반영 후 commit."
            exit 1
          }

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun test

      - name: Build Electron app
        run: bun run build

      - name: Check Electron ESM output for CJS require
        run: bun run check:dist-require

      # Fork PR의 권한·캐시 정책은 저장소 운영 정책에 맞춰 별도 처리한다.
