# Release workflow — triggered when a GitHub Release is created (published or pre-release).
# Two-job pipeline:
#   1. build-agent  — ubuntu-latest (cross-compile Go + Node runtime + LSP bundle 모두 산출)
#   2. package      — macos-14 (Apple Silicon arm64 native)
#
# Apple Silicon arm64 만 지원. 이전엔 macos-13 (Intel x64) 매트릭스가 있었으나
# macos-13 러너 풀이 큐 대기로 자주 묶이고 사용자층 대비 비용 효율이 떨어져 제외.
# 향후 x64 가 다시 필요해지면 matrix 로 복귀 가능 — 단 그 경우 `gh release upload` step 이
# 매트릭스 잡 간 race condition 없이 한 번만 모든 자산을 모아 올리도록 재설계 필요.
#
# Publish 방식:
#   electron-builder 의 내장 publish 는 기존 published release ↔ 자체 draft 모드의
#   호환성 충돌이 있어 사용하지 않는다 (자산을 silent skip 함). `--publish never` 로
#   dist/ 산출물만 만들고, 별도 step 에서 `gh release upload --clobber` 로 명시 첨부.
#
# Apple code-signing: identity=null, notarize=false (electron-builder.yml 그대로).
# Secret: GITHUB_TOKEN 한 개만 사용. Apple secrets 없음.

name: Release

on:
  release:
    types: [created]

permissions:
  contents: write  # release asset 업로드에 필요

jobs:
  # ── Job 1: Agent 크로스컴파일 ────────────────────────────────────────────
  # ubuntu-latest를 쓰는 이유: 에이전트는 CGO_ENABLED=0(정적 링크)로 빌드돼
  # 빌드 호스트의 glibc/OS 와 무관 + Node runtime download + LSP bundle 도 OS
  # 독립적이라 어느 runner 에서도 OK. (과거 linux/amd64 는 네이티브 빌드라 CGO 가
  # 켜져 빌드 호스트 glibc 에 동적 링크됐고, 구버전 배포판에서 'GLIBC_x.xx not
  # found' 로 실패했다 — build-agent.ts 에서 CGO_ENABLED=0 을 강제해 해결.)
  # macOS runner 분당 과금이 ubuntu 대비 10x 이므로 ubuntu 에서 먼저 처리 후
  # artifact 로 공유한다.
  build-agent:
    name: Build agent (cross-compile)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        run: bun install --frozen-lockfile

      - name: Build agent (all platforms)
        run: bun run scripts/build-agent.ts

      - name: Upload agent artifact
        uses: actions/upload-artifact@v7
        with:
          name: agent-dist
          path: dist/agent
          # package job이 즉시 소비하므로 1일이면 충분
          retention-days: 1

  # ── Job 2: Electron 패키징 (arm64 only) ──────────────────────────────────
  # macos-14 = Apple Silicon native. node-pty/better-sqlite3가 arm64로 rebuild됨.
  package:
    name: Package (arm64)
    needs: build-agent
    runs-on: macos-14

    env:
      # NEXUS_CHANNEL 분기:
      #   prerelease=true  → 'beta'  (pre-release 릴리스는 beta 채널로 업데이트 전달)
      #   prerelease=false → 'stable' (정식 릴리스)
      # GitHub Actions의 삼항 표현식: `condition && 'true-val' || 'false-val'`
      NEXUS_CHANNEL: ${{ github.event.release.prerelease && 'beta' || 'stable' }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install JS dependencies
        # postinstall에서 electron-rebuild -f -w node-pty,better-sqlite3 실행.
        # --frozen-lockfile로 lockfile 변경을 방지한다.
        run: bun install --frozen-lockfile

      - name: Download agent artifact
        uses: actions/download-artifact@v8
        with:
          name: agent-dist
          path: dist/agent

      - name: Build renderer (electron-vite)
        run: bun run build

      - name: Package with electron-builder
        # `--publish never` 로 dist/ 산출물만 만든다.
        # electron-builder 내장 publish 는 기존 published release ↔ draft 모드 충돌로
        # 자산을 silent skip 하는 케이스가 있어 신뢰 못 함. 첨부는 다음 step 이 담당.
        run: >
          bun x electron-builder
          --mac dmg zip
          --arm64
          --publish never

      - name: Upload assets to release
        # `tag_name` 이 곧 release 식별자. `--clobber` 는 같은 이름 자산이 있으면 덮어쓴다
        # (workflow 재실행 안전성). latest-mac.yml 은 electron-updater 가 새 버전 감지에 쓰는
        # 메타파일이라 반드시 함께 올린다.
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/*.dmg dist/*.dmg.blockmap \
            dist/*.zip dist/*.zip.blockmap \
            dist/latest-mac.yml \
            --clobber
