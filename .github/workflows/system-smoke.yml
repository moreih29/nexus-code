name: System Smoke

on:
  push:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  system-smoke:
    name: Electron renderer system smoke
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.13"

      - name: Cache Bun lockfile install cache
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install Electron headless runtime dependencies
        run: |
          sudo apt-get update
          asound_package="libasound2"
          if apt-cache show libasound2t64 >/dev/null 2>&1; then
            asound_package="libasound2t64"
          fi
          sudo apt-get install -y --no-install-recommends \
            xvfb \
            libgtk-3-0 \
            libnss3 \
            libxss1 \
            libgbm1 \
            libxrandr2 \
            "$asound_package"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Electron renderer system smoke fixtures
        run: |
          xvfb-run -a bun test --max-concurrency=1 \
            ./packages/app/test/system/dock-layout-runtime.test.ts \
            ./packages/app/test/system/activity-bar-runtime.test.ts \
            ./packages/app/test/system/workspace-layout-persist-runtime.test.ts \
            ./packages/app/test/system/app-file-tree-refresh-runtime.test.ts \
            ./packages/app/test/system/file-tree-folder-toggle-runtime.test.ts \
            ./packages/app/test/system/app-shell-strict-mode-runtime.test.ts \
            ./packages/app/test/system/drop-overlay-runtime.test.ts \
            ./packages/app/test/system/ime-dock-preservation-runtime.test.ts \
            ./packages/app/test/system/floating-workspace-runtime.test.ts \
            ./packages/app/test/system/six-group-spatial-runtime.test.ts
