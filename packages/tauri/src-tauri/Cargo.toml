[package]
name = "nexus-tauri"
version = "0.0.0"
description = "Nexus Code — Tauri shell"
edition = "2021"
rust-version = "1.77"

[lib]
name = "nexus_tauri_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2.9.5", features = [] }
tauri-plugin-dialog = "2"
tauri-plugin-shell = "2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"

# Cycle A: tauri 2.9.5 핀 (OpenCode sst/opencode 운영 버전 참조). 2.10.1에서 proc macro 패닉 재현 이력(POC §3 Track A).
# fallback chain: (C) 이 핀으로 1차 시도 → cargo update → (A) rustup override 1.92.0. cargo update 산출물(Cargo.lock)은 .gitignore 배제.

[profile.release]
opt-level = "s"
lto = true
codegen-units = 1
strip = true
